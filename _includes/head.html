<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1A1612">
<meta name="color-scheme" content="dark">

{% seo title=false %}
<title>{% if page.title %}{{ page.title | escape }} — {{ site.title | escape }}{% else %}{{ site.title | escape }} — {{ site.tagline | escape }}{% endif %}</title>

<link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
{% feed_meta %}

<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%231A1612'/%3E%3Crect x='4' y='15' width='24' height='2' fill='%23D88A4A'/%3E%3Crect x='14' y='5' width='4' height='22' fill='%23E8DDC9'/%3E%3C/svg%3E">

{% if page.layout == 'post' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ page.title | jsonify }},
  "description": {{ page.description | default: page.excerpt | strip_html | normalize_whitespace | truncate: 160 | jsonify }},
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  {% if page.last_modified_at %}"dateModified": "{{ page.last_modified_at | date_to_xmlschema }}",{% else %}"dateModified": "{{ page.date | date_to_xmlschema }}",{% endif %}
  "author": {
    "@type": "Person",
    "name": {{ site.social.name | default: site.title | jsonify }},
    "url": "{{ '/' | absolute_url }}"
  },
  "publisher": {
    "@type": "Person",
    "name": {{ site.social.name | default: site.title | jsonify }}
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ page.url | absolute_url }}"
  }{% if page.image %},
  "image": {{ page.image.path | default: page.image | absolute_url | jsonify }}{% endif %}{% if page.tags %},
  "keywords": {{ page.tags | join: ', ' | jsonify }}{% endif %}
}
</script>
{% endif %}
