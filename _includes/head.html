<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<meta name="color-scheme" content="dark">

{% seo title=false %}
<title>{% if page.title %}{{ page.title | escape }} — {{ site.title | escape }}{% else %}{{ site.title | escape }} — {{ site.tagline | escape }}{% endif %}</title>

<link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
{% feed_meta %}

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&display=swap">

<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230A0A0A'/%3E%3Crect x='4' y='15' width='24' height='2' fill='%23F4ED1F'/%3E%3Crect x='14' y='5' width='4' height='22' fill='%23EDEDED'/%3E%3C/svg%3E">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebSite",
      "@id": "{{ '/' | absolute_url }}#website",
      "url": "{{ '/' | absolute_url }}",
      "name": {{ site.title | jsonify }},
      "description": {{ site.description | jsonify }},
      "inLanguage": {{ site.lang | default: 'en' | jsonify }},
      "publisher": { "@id": "{{ '/' | absolute_url }}#person" }
    },
    {
      "@type": "Person",
      "@id": "{{ '/' | absolute_url }}#person",
      "name": {{ site.social.name | default: site.title | jsonify }},
      "url": "{{ '/' | absolute_url }}",
      "image": {{ site.avatar | default: '/assets/img/avatar.png' | absolute_url | jsonify }}{% if site.social.links %},
      "sameAs": {{ site.social.links | jsonify }}{% endif %}
    }{% if page.layout == 'post' %},
    {
      "@type": "BlogPosting",
      "@id": "{{ page.url | absolute_url }}#post",
      "headline": {{ page.title | jsonify }},
      "description": {{ page.description | default: page.excerpt | strip_html | normalize_whitespace | truncate: 160 | jsonify }},
      "datePublished": "{{ page.date | date_to_xmlschema }}",
      "dateModified": "{% if page.last_modified_at %}{{ page.last_modified_at | date_to_xmlschema }}{% else %}{{ page.date | date_to_xmlschema }}{% endif %}",
      "author": { "@id": "{{ '/' | absolute_url }}#person" },
      "publisher": { "@id": "{{ '/' | absolute_url }}#person" },
      "mainEntityOfPage": { "@type": "WebPage", "@id": "{{ page.url | absolute_url }}" },
      "url": "{{ page.url | absolute_url }}"{% if page.image %},
      "image": {{ page.image.path | default: page.image | absolute_url | jsonify }}{% endif %}{% if page.tags %},
      "keywords": {{ page.tags | join: ', ' | jsonify }}{% endif %}{% if page.categories %},
      "articleSection": {{ page.categories | jsonify }}{% endif %}
    },
    {
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "{{ '/' | absolute_url }}" }{% if page.categories.first %},
        { "@type": "ListItem", "position": 2, "name": {{ page.categories.first | jsonify }}, "item": "{{ '/categories/' | append: page.categories.first | absolute_url }}/" },
        { "@type": "ListItem", "position": 3, "name": {{ page.title | jsonify }} }{% else %},
        { "@type": "ListItem", "position": 2, "name": {{ page.title | jsonify }} }{% endif %}
      ]
    }{% endif %}
  ]
}
</script>
